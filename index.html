<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Fit - Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --card: #1e1e1e; --text: #fff; --secondary: #2a2a2a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; }
        .container { padding: 15px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input, select { background: var(--secondary); border: 1px solid #333; color: white; padding: 14px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        
        .unit-toggle { display: flex; background: var(--secondary); border-radius: 10px; margin-bottom: 15px; padding: 5px; }
        .unit-toggle button { flex: 1; border: none; background: none; color: #888; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .unit-toggle button.active { background: var(--primary); color: #000; }

        .warmup-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 5px; }
        .warmup-row input { width: auto; margin: 0; }

        .btn-main { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        
        /* Lista de Histórico */
        .history-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; border-radius: 8px; margin-top: 5px; font-size: 0.9rem; }
        .btn-del { background: #ff4444; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        
        .last-log { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
        .hidden { display: none; }
        .chart-area { height: 200px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <label>Evolução de Carga</label>
        <select id="filterSelect" onchange="updateChartData()"></select>
        <div class="chart-area"><canvas id="evolutionChart"></canvas></div>
    </div>

    <div class="card">
        <label>Registrar Série</label>
        <input type="text" id="exName" placeholder="EX: AGACHAMENTO" oninput="showLastLog()">
        <div id="lastLogInfo" class="last-log"></div>
        
        <div class="unit-toggle">
            <button id="btnKg" class="active" onclick="setUnit('kg')">KG</button>
            <button id="btnPlaca" onclick="setUnit('placa')">PLACAS</button>
        </div>

        <div id="sectionKg">
            <input type="number" id="exWeight" placeholder="Peso (kg)">
        </div>

        <div id="sectionPlaca" class="hidden">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="numPlacas" placeholder="Placas">
                <input type="number" id="kgPorPlaca" value="5">
            </div>
        </div>

        <input type="number" id="exReps" placeholder="Repetições">

        <div class="warmup-row">
            <input type="checkbox" id="isWarmup">
            <span style="font-size: 0.8rem; color: #666">Aquecimento (não vai para o gráfico)</span>
        </div>
        
        <button class="btn-main" onclick="saveExercise()">Salvar Registro</button>
    </div>

    <div class="card">
        <label>Histórico Recente</label>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let db; let myChart; let currentUnit = 'kg';

    function setUnit(unit) {
        currentUnit = unit;
        document.getElementById('btnKg').classList.toggle('active', unit === 'kg');
        document.getElementById('btnPlaca').classList.toggle('active', unit === 'placa');
        document.getElementById('sectionKg').classList.toggle('hidden', unit === 'placa');
        document.getElementById('sectionPlaca').classList.toggle('hidden', unit === 'kg');
    }

    const request = indexedDB.open("AuraFitEliteDB", 3);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("logs")) {
            db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
        }
    };
    request.onsuccess = (e) => { db = e.target.result; initChart(); refreshUI(); };

    function initChart() {
        const ctx = document.getElementById('evolutionChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'kg', data: [], borderColor: '#00ff88', tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,136,0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function saveExercise() {
        const name = document.getElementById('exName').value.trim().toUpperCase();
        const reps = document.getElementById('exReps').value;
        const isWarmup = document.getElementById('isWarmup').checked;
        let weight = (currentUnit === 'kg') ? 
            parseFloat(document.getElementById('exWeight').value) : 
            parseFloat(document.getElementById('numPlacas').value) * parseFloat(document.getElementById('kgPorPlaca').value);

        if (!name || isNaN(weight)) return;

        const transaction = db.transaction(["logs"], "readwrite");
        transaction.objectStore("logs").add({
            nome: name, peso: weight, reps: reps, warmup: isWarmup,
            data: new Date().toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'})
        });

        transaction.oncomplete = () => {
            document.getElementById('exWeight').value = '';
            document.getElementById('isWarmup').checked = false;
            refreshUI(name);
        };
    }

    function refreshUI(selected) {
        const store = db.transaction("logs").objectStore("logs");
        store.getAll().onsuccess = (e) => {
            const logs = e.target.result;
            const nomes = [...new Set(logs.map(t => t.nome))];
            const select = document.getElementById('filterSelect');
            select.innerHTML = nomes.map(n => `<option value="${n}">${n}</option>`).join('');
            if(selected) select.value = selected;
            
            updateChartData();
            renderHistory(logs);
        };
    }

    function renderHistory(logs) {
        const historyList = document.getElementById('historyList');
        const ultimos = logs.slice(-5).reverse();
        historyList.innerHTML = ultimos.map(log => `
            <div class="history-item">
                <span><b>${log.nome}</b>: ${log.peso}kg x ${log.reps}</span>
                <button class="btn-del" onclick="deleteLog(${log.id})">X</button>
            </div>
        `).join('');
    }

    function deleteLog(id) {
        if(confirm("Apagar este registro?")) {
            const transaction = db.transaction(["logs"], "readwrite");
            transaction.objectStore("logs").delete(id);
            transaction.oncomplete = () => refreshUI();
        }
    }

    function updateChartData() {
        const filter = document.getElementById('filterSelect').value;
        const store = db.transaction("logs").objectStore("logs");
        store.getAll().onsuccess = (e) => {
            const data = e.target.result.filter(t => t.nome === filter && !t.warmup).slice(-8);
            myChart.data.labels = data.map(d => d.data);
            myChart.data.datasets[0].data = data.map(d => d.peso);
            myChart.update();
        };
    }

    function showLastLog() {
        const name = document.getElementById('exName').value.trim().toUpperCase();
        const store = db.transaction("logs").objectStore("logs");
        store.getAll().onsuccess = (e) => {
            const logs = e.target.result.filter(l => l.nome === name);
            const last = logs[logs.length - 1];
            document.getElementById('lastLogInfo').innerText = last ? 
                `Última vez: ${last.peso}kg x ${last.reps}` : "";
        };
    }
</script>
</body>
</html>
