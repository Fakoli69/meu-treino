<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Fit - Elite</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
 --primary:#00ff88;
 --bg:#121212;
 --card:#1e1e1e;
 --text:#fff;
 --secondary:#2a2a2a;
}

body{
 font-family:sans-serif;
 background:var(--bg);
 color:var(--text);
 margin:0;
 padding-bottom:20px;
}

.container{padding:15px;}

.card{
 background:var(--card);
 border-radius:16px;
 padding:20px;
 margin-bottom:15px;
 box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

label{
 display:block;
 font-size:.75rem;
 color:var(--primary);
 margin-bottom:5px;
 font-weight:bold;
 text-transform:uppercase;
}

input,select{
 background:var(--secondary);
 border:1px solid #333;
 color:white;
 padding:14px;
 border-radius:10px;
 width:100%;
 margin-bottom:10px;
 outline:none;
}

.unit-toggle{
 display:flex;
 background:var(--secondary);
 border-radius:10px;
 margin-bottom:15px;
 padding:5px;
}

.unit-toggle button{
 flex:1;
 border:none;
 background:none;
 color:#888;
 padding:10px;
 font-weight:bold;
 border-radius:8px;
 cursor:pointer;
}

.unit-toggle button.active{
 background:var(--primary);
 color:#000;
}

.btn-main{
 background:var(--primary);
 color:#000;
 border:none;
 padding:16px;
 border-radius:12px;
 width:100%;
 font-weight:900;
 cursor:pointer;
}

.history-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#222;
 padding:12px;
 border-radius:8px;
 margin-top:5px;
}

.btn-del{
 background:#ff4444;
 border:none;
 color:#fff;
 padding:5px 10px;
 border-radius:6px;
 cursor:pointer;
}

.hidden{display:none;}
.chart-area{height:200px;}
.last-log{font-size:.85rem;color:#aaa;margin-bottom:10px;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<label>Evolução de Carga</label>
<select id="filterSelect" onchange="updateChartData()"></select>
<div class="chart-area"><canvas id="evolutionChart"></canvas></div>
</div>

<div class="card">
<label>Registrar Série</label>

<input type="text" id="exName" placeholder="EX: SUPINO" oninput="showLastLog()">
<div id="lastLogInfo" class="last-log"></div>

<div class="unit-toggle">
<button id="btnKg" class="active" onclick="setUnit('kg')">KG</button>
<button id="btnPlaca" onclick="setUnit('placa')">PLACAS</button>
</div>

<div id="sectionKg">
<input type="number" id="exWeight" placeholder="Peso (kg)">
</div>

<div id="sectionPlaca" class="hidden">
<div style="display:flex;gap:10px;">
<input type="number" id="numPlacas" placeholder="Placas">
<input type="number" id="kgPorPlaca" value="5">
</div>
</div>

<input type="number" id="exReps" placeholder="Repetições">

<label><input type="checkbox" id="isWarmup"> Aquecimento</label>

<button id="saveBtn" class="btn-main" onclick="saveExercise()">Salvar Registro</button>

</div>

<div class="card">
<label>Histórico</label>
<div id="historyList"></div>
<button class="btn-main" onclick="exportData()">Exportar</button>
</div>

</div>

<script>

let db;
let myChart;
let currentUnit='kg';
let currentWorkout=Date.now();

// UNIT SWITCH
function setUnit(unit){
 currentUnit=unit;

 btnKg.classList.toggle('active',unit==='kg');
 btnPlaca.classList.toggle('active',unit==='placa');

 sectionKg.classList.toggle('hidden',unit==='placa');
 sectionPlaca.classList.toggle('hidden',unit==='kg');
}

// DB
const request=indexedDB.open("AuraFitEliteDB",4);

request.onupgradeneeded=e=>{
 db=e.target.result;
 if(!db.objectStoreNames.contains("logs")){
  db.createObjectStore("logs",{keyPath:"id",autoIncrement:true});
 }
};

request.onsuccess=e=>{
 db=e.target.result;
 initChart();
 refreshUI();
};

// CHART
function initChart(){
 const ctx=document.getElementById('evolutionChart').getContext('2d');

 myChart=new Chart(ctx,{
  type:'line',
  data:{
   labels:[],
   datasets:[{
    data:[],
    borderColor:'#00ff88',
    borderWidth:3,
    pointRadius:4,
    tension:.4,
    fill:true,
    backgroundColor:'rgba(0,255,136,0.1)'
   }]
  },
  options:{responsive:true,maintainAspectRatio:false}
 });
}

// SAVE
function saveExercise(){

 const name=exName.value.trim().toUpperCase();
 const reps=parseInt(exReps.value);
 const isWarmup=isWarmupCheckbox.checked;

 let weight=(currentUnit==='kg')
 ?parseFloat(exWeight.value)
 :parseFloat(numPlacas.value)*parseFloat(kgPorPlaca.value);

 // VALIDAÇÃO
 if(!name){alert("Digite o exercício");return;}
 if(!reps || reps<=0){alert("Repetições inválidas");return;}
 if(isNaN(weight) || weight<=0){alert("Peso inválido");return;}

 const btn=saveBtn;
 btn.innerText="Salvando...";
 btn.disabled=true;

 const tx=db.transaction(["logs"],"readwrite");

 tx.objectStore("logs").add({
  nome:name,
  peso:weight,
  reps:reps,
  warmup:isWarmup,
  timestamp:Date.now(),
  data:new Date().toLocaleDateString('pt-BR')
 });

 tx.oncomplete=()=>{
  btn.innerText="Salvo ✔";

  setTimeout(()=>{
   btn.innerText="Salvar Registro";
   btn.disabled=false;
  },1000);

  exWeight.value='';
  exReps.value='';
  isWarmupCheckbox.checked=false;

  refreshUI(name);
 };
}

// UI
function refreshUI(selected){
 const store=db.transaction("logs").objectStore("logs");

 store.getAll().onsuccess=e=>{
  const logs=e.target.result;

  const nomes=[...new Set(logs.map(t=>t.nome))];

  filterSelect.innerHTML=nomes.map(n=>`<option>${n}</option>`).join('');

  if(selected) filterSelect.value=selected;

  updateChartData();
  renderHistory(logs);
 };
}

// HISTORY
function renderHistory(logs){
 const ultimos=logs.sort((a,b)=>b.timestamp-a.timestamp).slice(0,5);

 historyList.innerHTML=ultimos.map(log=>`
  <div class="history-item">
   <span>
    <b>${log.nome}</b>: ${log.peso}kg x ${log.reps}
    <br><small>${log.data}</small>
   </span>
   <button class="btn-del" onclick="deleteLog(${log.id})">X</button>
  </div>
 `).join('');
}

// DELETE
function deleteLog(id){
 if(confirm("Apagar?")){
  const tx=db.transaction(["logs"],"readwrite");
  tx.objectStore("logs").delete(id);
  tx.oncomplete=()=>refreshUI(filterSelect.value);
 }
}

// CHART UPDATE
function updateChartData(){
 const filter=filterSelect.value;

 const store=db.transaction("logs").objectStore("logs");

 store.getAll().onsuccess=e=>{
  const data=e.target.result
   .filter(t=>t.nome===filter && !t.warmup)
   .slice(-8);

  myChart.data.labels=data.map(d=>d.data);
  myChart.data.datasets[0].data=data.map(d=>d.peso);

  myChart.update();
 };
}

// LAST LOG
function showLastLog(){
 const name=exName.value.trim().toUpperCase();

 const store=db.transaction("logs").objectStore("logs");

 store.getAll().onsuccess=e=>{
  const logs=e.target.result.filter(l=>l.nome===name);

  if(logs.length===0){
   lastLogInfo.innerText="";
   return;
  }

  logs.sort((a,b)=>a.timestamp-b.timestamp);

  const last=logs.at(-1);
  const prev=logs.at(-2);

  const pr=Math.max(...logs.map(l=>l.peso));

  let progress="";
  if(prev){
   const diff=last.peso-prev.peso;
   if(diff>0) progress=` ↑ +${diff}kg`;
  }

  lastLogInfo.innerText=`PR: ${pr}kg | Última: ${last.peso}kg x ${last.reps}${progress}`;
 };
}

// EXPORT
function exportData(){
 const store=db.transaction("logs").objectStore("logs");

 store.getAll().onsuccess=e=>{
  const blob=new Blob([JSON.stringify(e.target.result,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="backup.json";
  a.click();

  URL.revokeObjectURL(url);
 };
}

</script>
</body>
</html>
